# Netlify deploy config for the Sailing ETA Calculator.
# It's a static site with no build step — just publish the repo root.

[build]
  publish = "."
  command = ""

# Long-cache the static assets; keep HTML fresh so updates show immediately.
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
